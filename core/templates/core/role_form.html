{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>{% if role %}Editar{% else %}Nova{% endif %} Função</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Nome da Função</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ role.name|default:'' }}" required>
        </div>
        
        <div class="form-group mt-3">
            <label>Permissões</label>
            <div class="row">
                {% for permission in permissions %}
                <div class="col-md-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" name="permissions" value="{{ permission.id }}"
                            {% if role and permission in role.permissions.all %}checked{% endif %}>
                        <label class="form-check-label">{{ permission.name }} ({{ permission.module.name }})</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'role_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
